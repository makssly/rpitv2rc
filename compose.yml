services:
  nginx:
    image: nginx:latest
    container_name: signage_nginx
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8002:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - ./data/files:/usr/share/nginx/html/media:ro
      - ./nginx_temp:/var/cache/nginx
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro
  app:
    build: .
    container_name: filemanager
    restart: unless-stopped
    user: "1000:1000"
    #ports:
    #  - "8003:8000"
    volumes:
      - ./data/files:/files
      - ./data/db:/db
    env_file:
      - .env
    environment:
      - FILES_ROOT=/files
      - DB_PATH=/db/filemanager.db    

  manifest_generator:
    build:
      context: .
      dockerfile: manifest_generator.Dockerfile
    container_name: signage_manifest_gen
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - ./data/files:/media
      - ./generate_manifest.sh:/usr/local/bin/generate_manifest.sh:ro