services:
  nginx:
    image: nginx:latest
    container_name: signage_nginx
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8002:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - ./data/media:/usr/share/nginx/html/media:ro
      - ./nginx_temp:/var/cache/nginx
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: signage_ui
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - FB_BASEURL=/admin
      - UMASK=022
    volumes:
      - ./data/media:/srv #каталог для видео
      - ./data:/database
      - ./data:/config
      - /etc/localtime:/etc/localtime:ro

  manifest_generator:
    build:
      context: .
      dockerfile: manifest_generator.Dockerfile
    container_name: signage_manifest_gen
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - ./data/media:/media
      - ./generate_manifest.sh:/usr/local/bin/generate_manifest.sh:ro